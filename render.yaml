services:
  - type: web
    name: astroknowledge
    runtime: node
    plan: free
    region: india
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    domains:
      - astroknowledge.in
      - www.astroknowledge.in
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        value: https://astroknowledge.in
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
